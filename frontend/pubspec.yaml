name: cinemora
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  intl: ^0.19.0
  flutter_screenutil: ^5.9.3
  lottie: ^3.1.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
  go_router: ^14.6.3
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4
  flutter_native_splash: ^2.4.3
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/cinemora_icon.png"
  adaptive_icon_background: "#141418"
  adaptive_icon_foreground: "assets/icons/cinemora_transparent_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#141418"
  image: "assets/icons/cinemora_splash.png"
  android_12:
    color: "#141418"
    icon_background_color: "#141418"
    image: "assets/icons/cinemora_splash.png"
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/achievement_badges/
    - assets/images/streaming_platforms/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter_18pt-Italic.ttf
          style: italic
